{% extends 'base.html' %}

{% block content %}
<div class="profile-setup-page fade-in">
    <div class="page-header" style="animation: fadeInUp 0.4s ease-out;">
        <h1>🎯 Profession Profile Setup</h1>
        <p style="color: var(--text-muted); margin-top:6px;">
            Tell us about yourself so we can personalise your daily task checklist.
        </p>
    </div>

    <div class="profile-setup-card glass">
        <form action="{{ url_for('profile_setup') }}" method="POST" id="profileForm" novalidate>

            <!-- ── Full Name ─────────────────────────────────────────── -->
            <div class="psetup-field-group">
                <label class="psetup-label">
                    <span class="psetup-icon">👤</span> Full Name <span style="color:var(--text-muted); font-size:0.78rem;">(optional)</span>
                </label>
                <input
                    type="text"
                    name="full_name"
                    class="psetup-input"
                    placeholder="e.g. Mukesh Raj"
                    value="{{ (profile.full_name or '') if profile else '' }}"
                    maxlength="100"
                >
            </div>

            <!-- ── Profession Type ────────────────────────────────────── -->
            <div class="psetup-field-group">
                <label class="psetup-label">
                    <span class="psetup-icon">🏷️</span> Profession Type <span class="psetup-required">*</span>
                </label>
                <select
                    name="profession_type"
                    id="profTypeSelect"
                    class="psetup-input psetup-select"
                    required
                    onchange="handleProfessionChange(this.value)"
                >
                    <option value="" disabled {{ 'selected' if not profile or not profile.profession_type }}>— Select your profession —</option>
                    <option value="Student"              {{ 'selected' if profile and profile.profession_type == 'Student' }}>🎓 Student</option>
                    <option value="Working Professional" {{ 'selected' if profile and profile.profession_type == 'Working Professional' }}>💼 Working Professional</option>
                    <option value="Content Creator"      {{ 'selected' if profile and profile.profession_type == 'Content Creator' }}>🎬 Content Creator</option>
                    <option value="Other"                {{ 'selected' if profile and profile.profession_type == 'Other' }}>✨ Other</option>
                </select>
            </div>

            <!-- ── Field of Interest ─────────────────────────────────── -->
            <div class="psetup-field-group">
                <label class="psetup-label">
                    <span class="psetup-icon">🔭</span> Field of Interest <span style="color:var(--text-muted); font-size:0.78rem;">(optional — used for task personalisation)</span>
                </label>
                <input
                    type="text"
                    name="field_of_interest"
                    class="psetup-input"
                    placeholder="e.g. Web Development, AI/ML, Finance, Cybersecurity…"
                    value="{{ (profile.field_of_interest or '') if profile else '' }}"
                    maxlength="100"
                >
            </div>

            <!-- ── Student Fields ────────────────────────────────────── -->
            <div id="studentFields" class="conditional-fields" style="display:none;">
                <div class="psetup-section-divider">
                    <span class="psetup-section-label">🎓 Student Details</span>
                </div>
                <div class="psetup-grid-2">
                    <div class="psetup-field-group">
                        <label class="psetup-label">Degree</label>
                        <input type="text" name="degree" class="psetup-input"
                               placeholder="e.g. B.Tech, BCA, B.Sc"
                               value="{{ (profile.degree or '') if profile else '' }}" maxlength="80">
                    </div>
                    <div class="psetup-field-group">
                        <label class="psetup-label">Branch / Specialisation</label>
                        <input type="text" name="branch" class="psetup-input"
                               placeholder="e.g. Computer Science, ECE"
                               value="{{ (profile.branch or '') if profile else '' }}" maxlength="80">
                    </div>
                </div>
                <div class="psetup-grid-2">
                    <div class="psetup-field-group">
                        <label class="psetup-label">Year of Study</label>
                        <select name="year_of_study" class="psetup-input psetup-select">
                            <option value="" {{ 'selected' if not profile or not profile.year_of_study }}>— Select year —</option>
                            {% for yr in ['1st Year', '2nd Year', '3rd Year', '4th Year', 'Final Year', 'Post-Graduate'] %}
                            <option value="{{ yr }}" {{ 'selected' if profile and profile.year_of_study == yr }}>{{ yr }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="psetup-field-group">
                        <label class="psetup-label">Institution</label>
                        <input type="text" name="institution" class="psetup-input"
                               placeholder="e.g. VIT, MIT, IIT Madras"
                               value="{{ (profile.institution or '') if profile else '' }}" maxlength="120">
                    </div>
                </div>
            </div>

            <!-- ── Working Professional Fields ──────────────────────── -->
            <div id="proFields" class="conditional-fields" style="display:none;">
                <div class="psetup-section-divider">
                    <span class="psetup-section-label">💼 Professional Details</span>
                </div>
                <div class="psetup-grid-2">
                    <div class="psetup-field-group">
                        <label class="psetup-label">Industry</label>
                        <input type="text" name="industry" class="psetup-input"
                               placeholder="e.g. Software, Finance, Healthcare"
                               value="{{ (profile.industry or '') if profile else '' }}" maxlength="80">
                    </div>
                    <div class="psetup-field-group">
                        <label class="psetup-label">Current Role</label>
                        <input type="text" name="role" class="psetup-input"
                               placeholder="e.g. Software Engineer, Product Manager"
                               value="{{ (profile.role or '') if profile else '' }}" maxlength="80">
                    </div>
                </div>
                <div class="psetup-field-group">
                    <label class="psetup-label">Years of Experience</label>
                    <select name="experience_years" class="psetup-input psetup-select">
                        <option value="" {{ 'selected' if not profile or not profile.experience_years }}>— Select range —</option>
                        {% for exp in ['Less than 1 year', '1-2 years', '3-5 years', '5-10 years', '10+ years'] %}
                        <option value="{{ exp }}" {{ 'selected' if profile and profile.experience_years == exp }}>{{ exp }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- ── Submit ────────────────────────────────────────────── -->
            <div style="margin-top: 28px; display: flex; gap: 12px; flex-wrap: wrap;">
                <button type="submit" class="psetup-btn-primary" id="saveProfileBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px; height:16px;"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Save Profile
                </button>
                {% if profile %}
                <a href="{{ url_for('profession_dashboard') }}" class="psetup-btn-secondary">
                    ← Back to Dashboard
                </a>
                {% endif %}
            </div>

        </form>
    </div>
</div>

<script>
function handleProfessionChange(value) {
    const studentDiv = document.getElementById('studentFields');
    const proDiv = document.getElementById('proFields');

    // Smooth show/hide
    studentDiv.style.display = (value === 'Student') ? 'block' : 'none';
    proDiv.style.display = (value === 'Working Professional') ? 'block' : 'none';

    if (value === 'Student') {
        studentDiv.classList.add('fade-in');
    }
    if (value === 'Working Professional') {
        proDiv.classList.add('fade-in');
    }
}

// On page load — restore conditional fields state if editing existing profile
document.addEventListener('DOMContentLoaded', () => {
    const sel = document.getElementById('profTypeSelect');
    if (sel && sel.value) {
        handleProfessionChange(sel.value);
    }

    // Prevent double-submit
    const form = document.getElementById('profileForm');
    const btn = document.getElementById('saveProfileBtn');
    if (form && btn) {
        form.addEventListener('submit', (e) => {
            const profession = document.getElementById('profTypeSelect').value;
            if (!profession) {
                e.preventDefault();
                alert('Please select your profession type before saving.');
                return;
            }
            btn.textContent = 'Saving…';
            btn.disabled = true;
        });
    }
});
</script>
{% endblock %}
